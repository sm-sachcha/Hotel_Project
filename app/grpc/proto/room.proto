syntax = "proto3";

package room;

message RoomRequest {
  int32 id = 1;
}

message RoomResponse {
  int32 id = 1;
  string title = 2;
  string description = 3;
  string price = 4;
  string wifi = 5;
  string room_type = 6;
  string image = 7;
}

service RoomService {
  rpc GetRoom(RoomRequest) returns (RoomResponse);
}
